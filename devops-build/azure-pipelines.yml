name: $(MajorVersion).$(MinorVersion).$(date:yyMM).$(DayOfMonth)$(rev:rrr)-$(Build.SourceBranchName)

resources:
  pipelines:
    - pipeline: octo-common-services
      source: octo-common-services-CI
      trigger:
        branches:
          include:
            - main
    # Phase 3 of the YAML migration carved the adapter framework out of
    # octo-sdk into octo-communication-sdk. mesh-adapter now restores
    # Meshmakers.Octo.Sdk.{Pipeline,Adapters,CommunicationAdapter,Common.Web,
    # SimulationNodes} from this repo, so its CI must re-fire when those
    # NuGets are republished. octo-sdk + DEH + CK-Engine are reached
    # transitively (octo-communication-sdk watches octo-sdk).
    - pipeline: octo-communication-sdk
      source: octo-communication-sdk-CI
      trigger:
        branches:
          include:
            - main
  repositories:
    - repository: helmChartBuild
      type: github
      name: meshmakers/helm-chart-build
      endpoint: meshmakers-access-token
      ref: refs/heads/main

trigger:
  batch: true
  branches:
    include:
      - dev/*
      - test/*
      - main
  tags:
    exclude:
      - '*'

variables:
  - group: GitSSHGroup
  - group: ApiKeys-mm-cloud
  - group: OctoDefault
  - name: solutionFile
    value: 'Octo.MeshAdapter.sln'    
  - name: artifactsFrameworkVersion
    value: 'net10.0'
  - name: buildConfiguration
    value: 'Release'
  - name: buildPlatform
    value: 'Any CPU'
  - name: isRelease
    value: ${{ startsWith(variables['Build.SourceBranch'], 'refs/tags/r') }}
  - name: isMain
    value: ${{ eq(variables['Build.SourceBranch'], 'refs/heads/main') }}
  - name: isTest
    value: ${{ startsWith(variables['Build.SourceBranch'], 'refs/heads/test') }}

stages:
  - stage: Build
    jobs:
      - job: linux
        displayName: Docker build
        pool:
          name: meshmakers-ci-agents
        steps:
          - template: update-build-number.yml
          # Sets $(ChartVersion) — 3-segment SemVer derived from
          # Build.BuildNumber. See helm-chart-build's docs/PUBLISHING.md.
          - template: ci-templates/derive-chart-version.yml@helmChartBuild
          - checkout: self
            clean: true
            submodules: recursive
          - task: InstallSSHKey@0
            inputs:
              knownHostsEntry: '$(SSHKnownHosts)'
              sshPublicKey: '$(SSHPublicKey)'
              sshPassphrase: '$(SSHPassphrase)'
              sshKeySecureFile: '$(SSHPrivateKeyFile)'
          - template: set-version.yml
          - template: download-ca.yml
          - task: DotNetCoreCLI@2
            displayName: 'Restore NuGet packages'
            inputs:
              command: 'restore'
              projects: '$(SolutionFile)'
              restoreArguments: '--force /p:OctoNugetPrivateServer=$(nugetPrivateServer)'
              noCache: true
          - task: DotNetCoreCLI@2
            displayName: 'Build'
            inputs:
              command: 'build'
              projects: $(SolutionFile)
              arguments: '--configuration $(BuildConfiguration) -p:OctoNugetPrivateServer=$(NugetPrivateServer)'
              publishWebProjects: false
              zipAfterPublish: false
              modifyOutputPath: false
          - task: DotNetCoreCLI@2
            displayName: 'Test'
            inputs:
              command: 'test'
              arguments: '--configuration $(buildConfiguration) /p:OctoNugetPrivateServer=$(nugetPrivateServer)'
              projects: |
                **/*Tests.csproj
                !**/*SystemTests.csproj
              testRunTitle: 'CI'
          - task: PowerShell@2
            inputs:
              filePath: '$(System.DefaultWorkingDirectory)/devops-build/createDocumentation.ps1'
              arguments: '-configuration $(buildConfiguration)'
            displayName: 'Create documentation'              
          - template: build-and-push-docker-image.yml
            parameters:
              # Build multi-arch so the adapter runs on arm64 nodes (e.g. Apple-Silicon
              # local dev clusters), matching octo-communication-operator / octo-eda-adapter /
              # octo-sdk. The Dockerfile builds the .NET app on $BUILDPLATFORM and selects
              # arch-specific runtime deps (libpng12) via $TARGETARCH.
              Architecture: 'linux/arm64,linux/amd64'
              PublicRegistryServiceConnection: $(DockerRegistryPublicConnection)
              PrivateRegistryName: $(DockerRegistryPrivateUri)
              Repository: meshmakers/octo-mesh-adapter
              Dockerfile: src/MeshAdapter/Dockerfile
          # Chart version is $(ChartVersion) — derived by derive-chart-version.yml
          # from Build.BuildNumber. On main: 0.1.<yyMM><DDxxx> (e.g. 0.1.260518002);
          # on r-tags: <Major>.<Minor>.<Patch>. Strict 3-segment SemVer for Helm.
          - task: HelmDeploy@0
            displayName: 'helm package octo-mesh-adapter'
            inputs:
              command: package
              chartPath: '$(System.DefaultWorkingDirectory)/src/charts/octo-mesh-adapter'
              chartVersion: '$(ChartVersion)'
              destination: '$(Build.artifactstagingdirectory)'
              arguments: '--app-version $(Build.BuildNumber) --dependency-update'
          # Dev (rolling) publish — every main build lands in
          # helm-chart-build's gh-pages catalog.
          - template: ci-templates/publish-helm-chart.yml@helmChartBuild
            parameters:
              channel: dev
              chartName: octo-mesh-adapter
              chartVersion: $(ChartVersion)
              chartTgzPath: $(Build.artifactstagingdirectory)/octo-mesh-adapter-$(ChartVersion).tgz
              githubTokenVariable: HelmChartBuildGhToken
              condition: and(succeeded(), eq(variables.isMain, true))
          # Release publish — only on r* tag, lands in
          # meshmakers.github.io/charts/ alongside the other platform charts.
          - template: ci-templates/publish-helm-chart.yml@helmChartBuild
            parameters:
              channel: release
              chartCategory: adapter
              chartName: octo-mesh-adapter
              chartVersion: $(ChartVersion)
              chartTgzPath: $(Build.artifactstagingdirectory)/octo-mesh-adapter-$(ChartVersion).tgz
              githubTokenVariable: HelmChartBuildGhToken
              condition: and(succeeded(), eq(variables.isRelease, true))
          - template: handle-artifacts.yml
            parameters:
              apiDocumentationPaths:
                - '$(Build.SourcesDirectory)/bin/$(buildConfiguration)/$(artifactsFrameworkVersion)/documentation'
          - template: push-nuget-package.yml

